	<div class="ws_images"><ul>
<li><img src="data1/images/concierge14.jpg" alt="concierge-14" title="Ask for a special cocktail – and – dinner evening at an exotic location along your itinerary." id="wows1_0"/></li>
<li><img src="data1/images/concierge15.jpg" alt="concierge-15" title="Ask to see the latest Bollywood flick in a luxury box at the movie theatre in town…every movie is a smorgasbord of music, unforgettable exotic dancing, and a visual treat of color & emotion!" id="wows1_1"/></li>
<li><img src="data1/images/diveunder.jpg" alt="dive-under" title="Dive under!
Take an onboard diving holiday off the coast of the Andaman Islands near a dormant volcano..stay, eat and sleep aboard a luxury yacht, only to wake up in the morning to stare at nothingness.
" id="wows1_2"/></li>
<li><img src="data1/images/elepolo.jpg" alt="ele-polo" title="Elephant Polo is a most amusing game played with a stick and ball on elephant back – absolutely amusing because the elephant won’t move as fast as the ball does, due to its sheer size! The end result is much shouting & cheering,   and pure fun - with no heed to winning or losing." id="wows1_3"/></li>
<li><img src="data1/images/horsepolo.jpg" alt="horse-polo" title="On the other hand, Horse polo is serious business – the sheer speed, strength and agility of the majestic   thoroughbred horses makes this one of the most exhilarating experiences in Rajasthan.  Don’t be surprised to have goose bumps in excitement towards the end of a tie. Polo season in India is Delhi, Bombay, Jodhpur, Jaipur  & Imphal" id="wows1_4"/></li>
<li><img src="data1/images/learntocook.jpg" alt="Learn-to-cook" title="Learn to cook an Indian meal
Stay at the home of a family belonging to the nobles of Jodhpur. Watch a tongue – tickling meal of traditional Laal maas (lamb in fiery red gravy) being cooked over a slow fire – just the way it was done for royalty; and then enjoy the meal with a glass of wine!
" id="wows1_5"/></li>
<li><img src="data1/images/outfit.jpg" alt="outfit" title="Get an Indian / Bhutanese outfit made bespoke
The traditional wear of most modern Indian women is either a six yard wonder of cloth called a saree, or the more contemporary salwar – khameez.  The men prefer a  churidar kurta.  The churidar is the narrower, sleeker cousin of the humble pyjama, with folds at the ankles to give an impression of height and slenderness.  It comes in both male and female versions, and a tailor made version is  a great, not –so-expensive memoir to take back home. Most locations in India also offer to make bespoke western business suits – prepare to be surprised by their expertise and speed.
" id="wows1_6"/></li>
<li><img src="data1/images/pickyourowntea.jpg" alt="Pick-your-own-tea" title="Pick your own tea!
Take a ‘tea walk’ through the slopes of a tea estate in Kumaon – tea country – learn to pick a tea leaf, and have a tea tasting session.
" id="wows1_7"/></li>
<li><img src="data1/images/rickshawride.jpg" alt="rickshaw-ride" title="Ride a cycle rickshaw : 
A most delightful way to explore old bazaars of Chandni Chowk in Delhi, the walled city of Jaipur, or the ghats at Varanasi is the cycle rickshaw. It seats two at the most, and slowly makes its way along streets full of local delicacies, artisans, cloth merchants and perfumers. Stop to sample a ‘samosa ‘ – a most intriguing savoury made out of potatoes and peas wrapped in a flaky pastry and deep fried.  Follow it up with a plate of jalebis – the perfect antidote for a tongue on fire.
" id="wows1_8"/></li>
<li><img src="data1/images/soulsearch.jpg" alt="soul-search" title="Soul search..
Take a body-and-soul cleansing break at the Vana Retreat – Malsi Estate in the hills near Dehradun – their approach to wellness is all-encompassing and includes cuisine, relaxation, music, art, outdoor activities, discourses and discussion.
" id="wows1_9"/></li>
<li><img src="data1/images/walkingtours.jpg" alt="walking-tours" title="Explore old cities on foot – walking tours.
Walk through bustling Bombay to the famous J J School of Art campus, the compound of which is famous for being the birthplace of Rudyard Kipling. Browse through thousands of old books on the footpaths at Fountain. Wander across Shimla’s Table Top - people basking in the sun, ladies drying their laundry outside the house, washing clothes at public taps, children playing street cricket, a few shopkeepers busy with their daily customers and old men reading newspaper or just chatting. Haggle for trinkets with the quaint shops in the old world markets of Jodhpur, or get your own lac bangles made at the lac makers in Maniharon – Ka – Rasta in Jaipur, while pampering those tired limbs with a super cup of authentic masala chai – tea made with a most exotic combination of spices. Explore the old city of Mysore, the City of Palaces, famous for its silk, sandal, sweets and also the world capital of Ashtanga Yoga. 
" id="wows1_10"/></li>
<li><img src="data1/images/winecountry.jpg" alt="wine-country" title="Visit wine country:
Visit the vineyards at Nasik in India…the proud pioneer of Indian wine.  Take a wine making tour, and make a dead stop when you come to the best part…the actual tasting session!.
" id="wows1_11"/></li>
</ul></div>
